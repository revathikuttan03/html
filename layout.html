<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .maindiv{
            display: grid;
            grid-template-columns: 2fr 6fr 2fr;
            grid-template-rows: 100px 600px 100px;
            background-color: antiquewhite;
        }
        div{
            border: 1px solid;
        }
        .div1{
            grid-row:1/2 ;
            grid-column:1/4 ;

        }
        .div2{
            grid-row: 2/3;
            grid-column: 2/3;
        }
        .div3{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .div5{
            grid-column: 1/4;
            grid-row: 3/4;
        }
    </style>
</head>
<body>
<div class="maindiv">
    <div class="div1">div1</div>
    <div class="div2">div2</div>
    <div cass="div3">div3</div>
    <div>div4</div>
    <div class="div5">div5</div>
</div>
</body>
</html>
