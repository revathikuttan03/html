<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .maindiv{
            display: grid;
            grid-template-columns: 2fr 6fr 2fr;
            grid-template-rows: 100px 600px 100px;
            background-color: antiquewhite;
        }
        div{
            border: 1px solid;
        }
        .div1{
            grid-row:1/2 ;
            grid-column:1/4 ;
            background-color: aqua;

        }
        .div2{
            grid-row: 2/3;
            grid-column: 2/3;
            background-color: blue;
        }
        .div3{
            grid-column: 1/2;
            grid-row: 2/3;
            background-color: yellow;
        }
        .div4{
            grid-column: 3/4;
            grid-row: 2/3;
            background-color: brown;
        }
        .div5{
            grid-column: 1/4;
            grid-row: 3/4;
            background-color: green;
        }

        @media (max-width:768px) {
            .maindiv{
                display: grid;
                grid-template-columns: 1fr 3fr;
                grid-template-rows: 50px 600px 50px 50px;
            }
            .div1{
                grid-column: 1/3;
                grid-row: 1/2;
                background-color: red;

            }
            .div2{
                grid-column:1/2 ;
                grid-row: 2/3;
                background-color: goldenrod;
            }
            .div3{
                grid-column: 2/3;
                grid-row: 2/3;
                background-color: purple;
            }
            .div4{
                grid-column: 1/3;
                grid-row: 3/4;
                background-color: gray;
            }
            .div5{
                grid-column: 1/3;
                grid-row: 4/5;
                background-color: pink;
            }

            
        }
        @media (max-width:425px) {
            .maindiv{
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: 50px 600px 50px 50px 50px;
            }
            .div1{
                grid-column: 1/2;
                grid-row: 1/2;
                background-color: magenta;
            }
            .div2{
                grid-column: 1/2;
                grid-row: 3/4;
                background-color: maroon;
            }
            .div3{
                grid-column: 1/2;
                grid-row: 2/3;
                background-color: aqua;

            }
            .div4{
                grid-column: 1/2;
                grid-row: 4/5;
                background-color: yellowgreen;
            }
            .div5{
                grid-column: 1/2;
                grid-row: 5/6;
                background-color: blueviolet;
            }
        }
    </style>
</head>
<body>
<div class="maindiv">
    <div class="div1">div1</div>
    <div class="div2">div2</div>
    <div class="div3">div3</div>
    <div class="div4">div4</div>
    <div class="div5">div5</div>
</div>
</body>
</html>
