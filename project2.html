<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
        }

        .div1 {
            height: 10vh;
            width: 100%;
            background-color: rgb(24, 25, 25);

        }

        .en {
            text-align: left;
            position: absolute;
            margin-left: 15px;
            color: white;
            font-size: 20px;
            font-weight: bolder;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;


        }

        .tspan {
            font-weight: normal;
        }

        .bybtn {
            position: absolute;
            margin-left: 1100px;
            color: white;
            background-color: green;
            padding: 10px;
            margin-top: 7px;
            border-radius: 10px;

        }
        .sec2{
            background-color: blueviolet;
            width: 100%;
            height: 80vh;
            overflow: hidden;
        }
        .body-sec2{
            width: 100%;
            height: 80vh;
            background: linear-gradient(135deg, #000 , #49494e 100%, #000000 200%);
            position: absolute;
            overflow: hidden;
        }
        .yellow-shade{
            height: 600px;
            width: 710px;
            background-color: rgba(255, 208, 0, 0.795);
            /* position: absolute; */
            transform: rotate(60deg);
            margin-left: -400px;

        }
    </style>
</head>

<body>
    <header>
        <div class="div1">
            <h1 class="en">envato<span class="tspan">market</span></h1>
            <p class="bybtn">Buy now</p>
        </div>
    </header>
    <section>
        <div class="sec2">
            <div class="body-sec2"></div>
            <div class="yellow-shade"></div>
            <div></div>

        </div>
    </section>
</body>

</html>
