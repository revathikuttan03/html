    <style>
        .div1{
            height: 100px;
            width: 100px;
            background-color: aqua;

        .div1:hover{

        .div2{

        }
        button:hover{
            background-color: aqua;
        }
        button:active{
            background-color: black;
        }
        .input1{
            border: 2px solid rgb(225, 171, 10);
        }
        .input1:focus{
            outline: none;
            border: 2px solid rgb(114, 225, 10);

        }
        a:link{

        a:visited{
